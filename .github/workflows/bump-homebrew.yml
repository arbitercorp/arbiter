name: Bump Homebrew formula

# Open a PR against the homebrew tap that bumps the `arbiter` formula's
# version + source URL on every `v*` tag push.  Requires a
# HOMEBREW_TAP_TOKEN secret with `contents: write` scoped to the tap repo.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to bump (e.g., v0.3.6)"
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: arbiter
          formula-path: Formula/arbiter.rb
          homebrew-tap: tylerreckart/homebrew-tap
          base-branch: main
          create-pullrequest: true
          tag-name: ${{ github.event.inputs.tag || github.ref_name }}
          download-url: https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.event.inputs.tag || github.ref_name }}.tar.gz
          commit-message: |
            arbiter ${{ github.event.inputs.tag || github.ref_name }}

            Created by https://github.com/mislav/bump-homebrew-formula-action
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
