name: CI

# Build + test on every PR and every push to main.  Mirrors the release
# matrix so anything that breaks in release.yml is caught here first.
# Pull-request runs use the standard GITHUB_TOKEN with read-only perms;
# no secrets needed.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

# Cancel an in-flight CI run when a new commit lands on the same ref —
# saves runner minutes on rapid pushes / force-pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    name: ${{ matrix.os_slug }}-${{ matrix.arch_slug }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on:   macos-14         # Apple Silicon
            os_slug:   macos
            arch_slug: arm64
          - runs_on:   macos-13         # Intel Macs
            os_slug:   macos
            arch_slug: x86_64
          - runs_on:   ubuntu-22.04     # glibc 2.35 — broad Linux compat
            os_slug:   linux
            arch_slug: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update --quiet
          brew install cmake openssl@3 libedit || true

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libssl-dev libcurl4-openssl-dev libedit-dev

      - name: Configure
        run: |
          EXTRA=""
          if [ "${{ runner.os }}" = "macOS" ]; then
            EXTRA="-DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)"
          fi
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DINDEX_BUILD_TESTS=ON \
            $EXTRA

      - name: Build
        run: cmake --build build --config Debug -j

      - name: Test
        run: ctest --test-dir build --output-on-failure -j 4
