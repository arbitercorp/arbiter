name: CI

# Build + test on every PR and every push to main.  Mirrors the release
# matrix so anything that breaks in release.yml is caught here first.
# Pull-request runs use the standard GITHUB_TOKEN with read-only perms;
# no secrets needed.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

# Cancel an in-flight CI run when a new commit lands on the same ref —
# saves runner minutes on rapid pushes / force-pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    name: ${{ matrix.os_slug }}-${{ matrix.arch_slug }}
    runs-on: ${{ matrix.runs_on }}
    # Hard upper bound: a hung PTY test should fail fast, not eat hours
    # of the workflow's 6-hour default budget.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          # Single macOS job builds a universal binary covering both
          # arm64 and x86_64 in one pass.  The previous Intel-specific
          # `macos-13` runner image was retired by GitHub in Dec 2025
          # and now queues forever.  AppleClang on macos-14 carries
          # the cross-arch SDK slices, so `-DCMAKE_OSX_ARCHITECTURES`
          # produces a fat binary native on both architectures; tests
          # execute the arm64 slice (the runner's host arch).  The
          # x86_64 slice is compile + link verified, not runtime
          # tested — but the codebase has no arch-specific paths, so
          # compile-time coverage catches any plausible regression.
          - runs_on:    macos-14
            os_slug:    macos
            arch_slug:  universal
            cmake_archs: "arm64;x86_64"
          - runs_on:    ubuntu-22.04   # glibc 2.35 — broad Linux compat
            os_slug:    linux
            arch_slug:  x86_64
            cmake_archs: ""

    steps:
      - uses: actions/checkout@v4

      # cmake is preinstalled on GitHub's macOS images; reinstalling via
      # `brew install cmake` triggers symlink conflicts ("cmake is keg-only
      # but is already linked").  Stick to libs that aren't pre-installed.
      # No `|| true` — a brew failure here means the build will fail
      # later in CMake configure with a less obvious error message; better
      # to surface the real cause now.
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euxo pipefail
          brew update --quiet
          brew install --formula openssl@3 libedit

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libssl-dev libcurl4-openssl-dev libedit-dev \
            libsqlite3-dev

      - name: Configure
        run: |
          EXTRA=""
          if [ "${{ runner.os }}" = "macOS" ]; then
            EXTRA="-DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)"
          fi
          ARCHS_FLAG=""
          if [ -n "${{ matrix.cmake_archs }}" ]; then
            ARCHS_FLAG='-DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_archs }}'
          fi
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DINDEX_BUILD_TESTS=ON \
            $EXTRA \
            $ARCHS_FLAG

      - name: Build
        run: cmake --build build --config Debug -j

      # `--no-tests=error` makes ctest fail loudly if no tests are
      # registered (a regression that would otherwise silently pass).
      # Tests run sequentially (`-j 1`) so the PTY-driven line_editor
      # suite doesn't fight other tests for runner CPU on slow images.
      - name: Test
        run: ctest --test-dir build --output-on-failure --no-tests=error -j 1
