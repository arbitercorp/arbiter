name: Build and publish release

# Build arbiter on tag push and publish a GitHub Release on this same
# repository with prebuilt binaries for each platform.  Tag-driven —
# pushing a `vX.Y.Z` tag is the only thing that fires this.
#
# Setup prereqs (one-time):
#   - Bump `project(arbiter VERSION X.Y.Z ...)` in CMakeLists.txt to match
#     the tag you're about to push (the binary embeds it via INDEX_VERSION).
#   - `git tag vX.Y.Z && git push origin vX.Y.Z` runs this workflow.
#     Or: Actions → Build and publish release → Run workflow → pick a tag.
#
# Asset naming (kept version-free so `releases/latest/download/...` works
# as a stable URL in install scripts):
#   arbiter-macos-arm64.tar.gz    (+ .sha256 sibling)
#   arbiter-macos-x86_64.tar.gz   (+ .sha256)
#   arbiter-linux-x86_64.tar.gz   (+ .sha256)
# Each tarball is flat: `arbiter` binary + LICENSE + README.md at the root.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (e.g., v0.3.6)"
        required: true

# Default perms are read-only; the publish job grants itself `contents:
# write` to upload assets to the GitHub Release of this repo.
permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.os_slug }}-${{ matrix.arch_slug }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Single macOS job builds a universal binary, then `lipo`
          # splits it back into per-arch slices so the existing
          # `arbiter-macos-arm64.tar.gz` and `arbiter-macos-x86_64.tar.gz`
          # release URLs (used by install scripts and the Homebrew
          # tap) stay stable.  GitHub retired `macos-13` in Dec 2025;
          # `macos-14` carries both arch SDK slices, so AppleClang
          # builds both in one configure+compile pass.
          - runs_on:    macos-14
            os_slug:    macos
            arch_slug:  universal
            cmake_archs: "arm64;x86_64"
          - runs_on:    ubuntu-22.04   # glibc 2.35 — broad Linux compat
            os_slug:    linux
            arch_slug:  x86_64
            cmake_archs: ""

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # cmake is preinstalled on GitHub's macOS images; reinstalling via
      # `brew install cmake` triggers symlink conflicts ("cmake is keg-only
      # but is already linked").  Stick to libs that aren't pre-installed.
      # No `|| true` — a brew failure here means the release build is
      # broken; better to surface it loudly than mask it.
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euxo pipefail
          brew update --quiet
          brew install --formula openssl@3 libedit

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libssl-dev libcurl4-openssl-dev libedit-dev

      - name: Configure
        run: |
          EXTRA=""
          if [ "${{ runner.os }}" = "macOS" ]; then
            EXTRA="-DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)"
          fi
          ARCHS_FLAG=""
          if [ -n "${{ matrix.cmake_archs }}" ]; then
            ARCHS_FLAG='-DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_archs }}'
          fi
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DINDEX_BUILD_TESTS=OFF \
            $EXTRA \
            $ARCHS_FLAG

      - name: Build
        run: cmake --build build --config Release -j

      - name: Strip symbols
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            strip -S build/arbiter
          else
            strip --strip-unneeded build/arbiter
          fi

      # macOS path: split universal binary into per-arch tarballs to
      # preserve `arbiter-macos-arm64.tar.gz` and
      # `arbiter-macos-x86_64.tar.gz` URLs.  Linux path: single tarball.
      - name: Stage + tarball
        run: |
          set -euxo pipefail
          tarball() {
            local name="$1"; local bin="$2"
            local stage="stage-$name"
            mkdir -p "$stage"
            install -m 755 "$bin" "$stage/arbiter"
            [ -f LICENSE ]   && cp LICENSE   "$stage/"
            [ -f README.md ] && cp README.md "$stage/"
            tar -C "$stage" -czf "${name}.tar.gz" .
            if command -v sha256sum >/dev/null; then
              sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
            else
              shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
            fi
          }
          if [ "${{ runner.os }}" = "macOS" ]; then
            for arch in arm64 x86_64; do
              lipo -extract "$arch" build/arbiter \
                   -output "build/arbiter-$arch"
              tarball "arbiter-macos-$arch" "build/arbiter-$arch"
            done
          else
            tarball \
              "arbiter-${{ matrix.os_slug }}-${{ matrix.arch_slug }}" \
              build/arbiter
          fi

      - name: Smoke test (extract + run --help)
        run: |
          set -euxo pipefail
          smoke() {
            local name="$1"; local runner_cmd="$2"
            local dir="smoke-$name"
            mkdir -p "$dir"
            tar -xzf "${name}.tar.gz" -C "$dir"
            $runner_cmd "./$dir/arbiter" --help > /dev/null
            echo "smoke $name: --help exit 0"
          }
          if [ "${{ runner.os }}" = "macOS" ]; then
            # arm64 runs natively; x86_64 via Rosetta 2 (preinstalled
            # on macos-14 runners).
            smoke "arbiter-macos-arm64" ""
            smoke "arbiter-macos-x86_64" "arch -x86_64"
          else
            smoke \
              "arbiter-${{ matrix.os_slug }}-${{ matrix.arch_slug }}" ""
          fi

      # One artifact per produced tarball.  macOS emits two from a
      # single job; Linux emits one.  Names match the publish step's
      # glob (`arbiter-*.tar.gz`).
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os_slug }}-${{ matrix.arch_slug }}
          path: |
            arbiter-*.tar.gz
            arbiter-*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List staged assets
        run: ls -la artifacts/

      - name: Create release and upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          REPO="${{ github.repository }}"

          # Create the release if it doesn't already exist.  --clobber on
          # upload makes re-running the workflow for the same tag idempotent
          # (assets replaced rather than duplicated).
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "arbiter $TAG" \
              --generate-notes
          fi

          gh release upload "$TAG" \
            --repo "$REPO" \
            --clobber \
            artifacts/arbiter-*.tar.gz \
            artifacts/arbiter-*.tar.gz.sha256
