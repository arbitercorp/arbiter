                - generic [ref=e1114]:
                  - heading "Extended Data Figure 4 ANE ancestry is present in both Europe and the Near East but WHG ancestry is restricted to Europe, which cannot be due to a single admixture event." [level=3] [ref=e1115]:
                    - link "Extended Data Figure 4 ANE ancestry is present in both Europe and the Near East but WHG ancestry is restricted to Europe, which cannot be due to a single admixture event." [ref=e1116] [cursor=pointer]:
                      - /url: /articles/nature13673/figures/8
                  - paragraph [ref=e1118]:
                    - text: On the x axis we present the statistic f
                    - subscript [ref=e1119]: "4"
                    - text: (Test, Stuttgart; MA1, Chimp), which measures where MA1 shares more alleles with a test population than with Stuttgart. It is positive for most European and Near Eastern populations, consistent with ANE (MA1-related) gene flow into both regions. On the y axis we present the statistic f
                    - subscript [ref=e1120]: "4"
                    - text: (Test, Stuttgart; Loschbour, Chimp), which measures whether Loschbour shares more alleles with a test sample than with Stuttgart. Only European populations show positive values of this statistic, providing evidence of WHG (Loschbour-related) admixture only in Europeans.
                - generic [ref=e1121]:
                  - heading "Extended Data Figure 5 MA1 is the best surrogate for ANE for which we have data." [level=3] [ref=e1122]:
                    - link "Extended Data Figure 5 MA1 is the best surrogate for ANE for which we have data." [ref=e1123] [cursor=pointer]:
                      - /url: /articles/nature13673/figures/9
                  - paragraph [ref=e1125]:
                    - text: Europeans share more alleles with MA1 than with Karitiana, as we see from the fact that in a plot of f
                    - subscript [ref=e1126]: "4"
                    - text: (Test, BedouinB; MA1, Chimp) and f
                    - subscript [ref=e1127]: "4"
                    - text: (Test, BedouinB; Karitiana, Chimp), the European cline deviates in the direction of MA1, rather than Karitiana (the slope is > 1 and European populations are above the line indicating inequality of these two statistics).
                - generic [ref=e1128]:
                  - heading "Extended Data Figure 6 The differential relatedness of west Eurasians to Stuttgart (EEF), Loschbour (WHG), and MA1 (ANE) cannot be explained by two-way mixture." [level=3] [ref=e1129]:
                    - link "Extended Data Figure 6 The differential relatedness of west Eurasians to Stuttgart (EEF), Loschbour (WHG), and MA1 (ANE) cannot be explained by two-way mixture." [ref=e1130] [cursor=pointer]:
                      - /url: /articles/nature13673/figures/10
                  - paragraph [ref=e1132]:
                    - text: We plot on a West Eurasian map the statistic f
                    - subscript [ref=e1133]: "4"
                    - text: (Test, Chimp; A
                    - subscript [ref=e1134]: "1"
                    - text: ", A"
                    - subscript [ref=e1135]: "2"
                    - text: ), where A
                    - subscript [ref=e1136]: "1"
                    - text: and A
                    - subscript [ref=e1137]: "2"
                    - text: are a pair of the three ancient samples representing the three ancestral populations of Europe. a, In both Europe and the Near East/Caucasus, populations from the south have more relatedness to Stuttgart than those from the north where ANE influence is also important. b, Northern European populations share more alleles with Loschbour than with Stuttgart, as they have additional WHG ancestry beyond what was already present in EEF. c, We observe a striking contrast between Europe west of the Caucasus and the Near East in degree of relatedness to WHG. In Europe, there is a much higher degree of allele sharing with Loschbour than with MA1, which we ascribe to the 60–80% WHG/(WHG + ANE) ratio in most Europeans that we report in
                    - link "Supplementary Information" [ref=e1138] [cursor=pointer]:
                      - /url: /articles/nature13673#MOESM45
                    - text: section 14. In contrast, the Near East has no appreciable WHG ancestry but some ANE ancestry, especially in the northern Caucasus. (Jewish populations are marked with a square in this figure to assist in interpretation as their ancestry is often anomalous for their geographic regions.)
