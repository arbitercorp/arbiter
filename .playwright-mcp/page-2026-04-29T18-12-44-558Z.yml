          - region "Abstract" [ref=e172]:
            - generic [ref=e173]:
              - heading "Abstract" [level=2] [ref=e174]
              - paragraph [ref=e176]:
                - text: We sequenced the genomes of a ∼7,000-year-old farmer from Germany and eight ∼8,000-year-old hunter-gatherers from Luxembourg and Sweden. We analysed these and other ancient genomes
                - superscript [ref=e177]:
                  - link "Reference 1" [ref=e178] [cursor=pointer]:
                    - /url: /articles/nature13673#ref-CR1
                    - text: "1"
                  - text: ","
                  - link "Reference 2" [ref=e179] [cursor=pointer]:
                    - /url: /articles/nature13673#ref-CR2
                    - text: "2"
                  - text: ","
                  - link "Reference 3" [ref=e180] [cursor=pointer]:
                    - /url: /articles/nature13673#ref-CR3
                    - text: "3"
                  - text: ","
                  - link "Reference 4" [ref=e181] [cursor=pointer]:
                    - /url: /articles/nature13673#ref-CR4
                    - text: "4"
                - text: "with 2,345 contemporary humans to show that most present-day Europeans derive from at least three highly differentiated populations: west European hunter-gatherers, who contributed ancestry to all Europeans but not to Near Easterners; ancient north Eurasians related to Upper Palaeolithic Siberians"
                - superscript [ref=e182]:
                  - link "Reference 3" [ref=e183] [cursor=pointer]:
                    - /url: /articles/nature13673#ref-CR3
                    - text: "3"
                - text: ", who contributed to both Europeans and Near Easterners; and early European farmers, who were mainly of Near Eastern origin but also harboured west European hunter-gatherer related ancestry. We model these populations’ deep relationships and show that early European farmers had ∼44% ancestry from a ‘basal Eurasian’ population that split before the diversification of other non-African lineages."
          - paragraph [ref=e185]:
